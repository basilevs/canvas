<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Canvas</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2.1.1/css/pico.min.css"
        integrity="sha384-L1dWfspMTHU/ApYnFiMz2QID/PlP1xCW9visvBdbEkOLkSSWsP6ZJWhPw6apiXxU"
        crossorigin="anonymous">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"
          integrity="sha384-/taWmisziXYpcfnYsumSUmNaiMvG/fF/OJOUCLnqCIYTrpOZy7WbFF6FfIxwOrfL"
          crossorigin="anonymous"></script>
</head>
<body>
  <main class="container-fluid whiteboard-shell">
    <section class="board-layout">
      <article class="canvas-shell">
        <canvas id="whiteboard-canvas" aria-label="Collaborative whiteboard canvas"></canvas>
      </article>
      <div class="toolbar-group toolbar-controls" role="toolbar" aria-label="Drawing and replay controls">
        <label class="live-only">
          Color
          <input id="color-input" type="color" value="#1e88e5">
        </label>
        <label class="live-only">
          Width
          <input id="width-input" type="range" min="1" max="24" value="4">
        </label>
        <button id="btn-undo" type="button" class="secondary live-only">↶ Undo</button>
        <button id="btn-replay" type="button">▶ Replay</button>
        <button id="btn-replay-playpause" type="button" class="secondary replay-only" hidden>⏸ Pause</button>
        <button id="btn-replay-stop" type="button" class="replay-only" hidden>⏹ Stop</button>
        <label class="replay-only" hidden>
          Speed
          <select id="replay-speed">
            <option value="1">1x</option>
            <option value="2">2x</option>
            <option value="4">4x</option>
          </select>
        </label>
        <span id="replay-timestamp" class="replay-only replay-timestamp" hidden></span>
      </div>

      <div id="replay-controls" class="replay-controls" hidden>
        <input type="range" id="replay-scrubber" min="0" max="1" step="0.001" value="0">
      </div>
    </section>
  </main>

  <section class="container-fluid">
    <article class="users-panel" role="complementary">
      <h2>Connected users</h2>
      <ul id="users-list"></ul>
      <p id="status-text" class="status-text" aria-live="polite"></p>
    </article>

    <article>
      <h2>Board</h2>
      <form id="board-form" role="group">
        <input id="board-input" name="board" type="text" placeholder="board-name" autocomplete="off" spellcheck="false">
        <button type="submit">Switch</button>
      </form>
    </article>

    <article>
      <h2>Display name</h2>
      <form id="display-name-form">
        <input id="display-name-input" name="displayName" type="text" maxlength="30" autocomplete="nickname" placeholder="Anonymous">
      </form>
    </article>
  </section>
  </nav>


  <script type="module" src="/js/app.js"></script>
</body>
</html>
